# release-plz config — https://release-plz.dev/docs/config

[workspace]
changelog_path = "./CHANGELOG.md"
allow_dirty = false
semver_check = false

git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

# `semver_check = false` (above): cargo-semver-checks treats every
# 0.x API change as a break, which would force a 0.x → 0.y bump and
# cascade through every dependent's version pin. Stay patch-only
# until we deliberately cut 1.0.
